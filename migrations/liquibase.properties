# Liquibase config for the tutor schema migrations.
# The tutor objects live in schema `tutor` (created by changeset 0001); Liquibase's own tracking
# tables are uniquely NAMED so they never collide with the cortex Scala app's public DATABASECHANGELOG
# in the shared database. URL / username / password are supplied by the runner (docker-compose env).
changelogFile: db.changelog-master.yaml
databaseChangelogTableName: tutor_databasechangelog
databaseChangelogLockTableName: tutor_databasechangeloglock
